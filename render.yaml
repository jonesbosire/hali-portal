# =============================================================================
# HALI Access Partner Portal — Render.com Deploy Config
# Docs: https://render.com/docs/render-yaml-reference
# =============================================================================

services:

  # ── Web service (Laravel app) ──────────────────────────────────────────────
  - type: web
    name: hali-portal
    runtime: php
    plan: free                        # free tier; upgrade to starter ($7/mo) for always-on
    buildCommand: bash deploy/railway-render-setup.sh
    startCommand: >
      php-fpm -D &&
      nginx -g 'daemon off;'
    healthCheckPath: /up
    autoDeploy: true                  # deploy on every push to main

    envVars:
      - key: APP_NAME
        value: "HALI Access Partner Portal"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          type: web
          name: hali-portal
          property: host
      - key: APP_KEY
        generateValue: true           # Render generates a random value on first deploy
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: hali-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: hali-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: hali-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: hali-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: hali-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: local
      - key: LOG_CHANNEL
        value: stderr              # Render captures stderr as logs
      - key: MAIL_MAILER
        value: smtp
      # Set these manually in Render dashboard (secrets):
      # MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD
      # MAIL_FROM_ADDRESS, MAIL_FROM_NAME

  # ── Queue worker ───────────────────────────────────────────────────────────
  - type: worker
    name: hali-queue-worker
    runtime: php
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader --no-interaction
    startCommand: php artisan queue:work database --sleep=3 --tries=3 --max-time=3600
    autoDeploy: true
    envVars:
      - fromGroup: hali-env          # share env vars with web service via env group

# ── MySQL database ─────────────────────────────────────────────────────────
databases:
  - name: hali-db
    plan: free                        # 1 GB storage free; expires after 90 days on free plan
    databaseName: hali_portal
    user: hali_user
