[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_mysql",
           "php83Extensions.mbstring", "php83Extensions.xml",
           "php83Extensions.curl", "php83Extensions.zip",
           "php83Extensions.bcmath", "php83Extensions.intl",
           "php83Extensions.gd", "php83Extensions.opcache",
           "php83Extensions.fileinfo", "php83Extensions.tokenizer",
           "php83Packages.composer", "nodejs_20", "nodePackages.npm"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist",
        "npm ci"]

[phases.build]
cmds = ["npm run build",
        "php artisan key:generate --force || true",
        "php artisan optimize",
        "php artisan migrate --force"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
